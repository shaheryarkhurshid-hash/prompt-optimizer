<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PromptCraft — AI Prompt Optimizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #09090b;
    color: #fafafa;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
  }

  .wrapper { width: 100%; max-width: 680px; }

  /* Header */
  header { text-align: center; margin-bottom: 48px; }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #22c55e;
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.2);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  h1 .highlight {
    background: linear-gradient(135deg, #22c55e, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header p {
    color: #71717a;
    font-size: 15px;
    font-weight: 400;
  }

  /* Input area */
  .input-wrapper {
    position: relative;
    margin-bottom: 12px;
  }

  textarea {
    width: 100%;
    padding: 16px 18px;
    border-radius: 14px;
    border: 1px solid #27272a;
    background: #111113;
    color: #fafafa;
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
    outline: none;
    line-height: 1.65;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-height: 140px;
  }

  textarea:focus {
    border-color: #22c55e;
    box-shadow: 0 0 0 3px rgba(34,197,94,0.08);
  }

  textarea::placeholder { color: #3f3f46; }

  /* Modes */
  .modes {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .mode-btn {
    padding: 6px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid #27272a;
    background: transparent;
    color: #71717a;
    transition: all 0.15s;
    font-family: inherit;
  }

  .mode-btn:hover {
    border-color: #3f3f46;
    color: #a1a1aa;
  }

  .mode-btn.active {
    background: #052e16;
    border-color: #166534;
    color: #22c55e;
  }

  /* Button */
  #optimizeBtn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    background: #22c55e;
    color: #052e16;
    border: none;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    letter-spacing: -0.2px;
  }

  #optimizeBtn:hover { background: #16a34a; }
  #optimizeBtn:active { transform: scale(0.99); }
  #optimizeBtn:disabled { opacity: 0.35; cursor: not-allowed; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(5,46,22,0.3);
    border-top-color: #052e16;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
  }

  .divider-line { flex: 1; height: 1px; background: #18181b; }
  .divider-text { font-size: 12px; color: #3f3f46; white-space: nowrap; }

  /* Output */
  #result-section { display: none; }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .output-label {
    font-size: 12px;
    font-weight: 600;
    color: #22c55e;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .tag {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 6px;
    background: #052e16;
    border: 1px solid #166534;
    color: #4ade80;
  }

  .output-box {
    padding: 16px 18px;
    border-radius: 14px;
    border: 1px solid #27272a;
    background: #111113;
    font-size: 15px;
    line-height: 1.75;
    white-space: pre-wrap;
    color: #e4e4e7;
    margin-bottom: 14px;
  }

  .actions { display: flex; gap: 8px; }

  .action-btn {
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid #27272a;
    background: transparent;
    color: #71717a;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .action-btn:hover {
    border-color: #3f3f46;
    color: #a1a1aa;
    background: #111113;
  }

  #error-msg {
    color: #f87171;
    font-size: 13px;
    margin-top: 12px;
    display: none;
    background: rgba(248,113,113,0.06);
    border: 1px solid rgba(248,113,113,0.15);
    padding: 10px 14px;
    border-radius: 10px;
  }

  footer {
    margin-top: 40px;
    text-align: center;
    font-size: 12px;
    color: #27272a;
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="badge">AI Powered</div>
    <h1>Make your prompts<br><span class="highlight">actually work.</span></h1>
    <p>Paste a rough prompt, get a precise and powerful one instantly.</p>
  </header>

  <textarea id="inputPrompt" rows="5" placeholder='e.g. "write me something about marketing"'></textarea>

  <div class="modes">
    <button class="mode-btn active" onclick="setMode(this,'Balanced')">⚖️ Balanced</button>
    <button class="mode-btn" onclick="setMode(this,'Detailed')">🔍 Detailed</button>
    <button class="mode-btn" onclick="setMode(this,'Concise')">⚡ Concise</button>
    <button class="mode-btn" onclick="setMode(this,'Creative')">🎨 Creative</button>
    <button class="mode-btn" onclick="setMode(this,'Technical')">🔧 Technical</button>
  </div>

  <button id="optimizeBtn" onclick="optimize()">
    <div class="spinner" id="spinner"></div>
    <span id="btnText">Optimize Prompt →</span>
  </button>

  <div id="error-msg"></div>

  <div id="result-section">
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">optimized result</div>
      <div class="divider-line"></div>
    </div>

    <div class="output-header">
      <span class="output-label">✦ Result</span>
    </div>
    <div class="tags" id="tags"></div>
    <div class="output-box" id="output-box"></div>
    <div class="actions">
      <button class="action-btn" id="copyBtn" onclick="copyOutput()">Copy</button>
      <button class="action-btn" onclick="useAsInput()">Use as Input</button>
      <button class="action-btn" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <footer>PromptCraft · Powered by Groq AI</footer>
</div>

<script>
  var currentMode = 'Balanced';

  var instructions = {
    Balanced: 'Make this prompt clear, specific, and well-structured for general use.',
    Detailed: 'Expand this prompt with rich context, examples, edge cases, and explicit output formatting instructions.',
    Concise: 'Make this prompt tight and minimal — remove all unnecessary words while keeping full precision.',
    Creative: 'Rewrite this prompt to unlock creative, imaginative, and open-ended responses.',
    Technical: 'Transform this into a precise technical prompt with exact specifications, constraints, and formats.'
  };

  var improvementTags = {
    Balanced: ['Added context', 'Clarified goal', 'Defined output format', 'Removed ambiguity'],
    Detailed: ['Rich context added', 'Examples included', 'Edge cases covered', 'Structured format'],
    Concise: ['Trimmed fluff', 'Sharp focus', 'Direct instruction'],
    Creative: ['Open-ended framing', 'Exploration encouraged', 'Tone unlocked'],
    Technical: ['Exact specs added', 'Constraints defined', 'Format specified']
  };

  function setMode(btn, m) {
    document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentMode = m;
  }

  async function optimize() {
    var input = document.getElementById('inputPrompt').value.trim();
    if (!input) return;

    var btn = document.getElementById('optimizeBtn');
    var spinner = document.getElementById('spinner');
    var btnText = document.getElementById('btnText');

    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Optimizing...';
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('result-section').style.display = 'none';

    try {
      var res = await fetch('/optimize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: input, mode: currentMode, instruction: instructions[currentMode] })
      });
      var data = await res.json();
      if (!res.ok) {
        var err = document.getElementById('error-msg');
        err.textContent = 'Error: ' + (data.error || 'Something went wrong');
        err.style.display = 'block';
      } else {
        document.getElementById('output-box').textContent = data.optimized;
        var tagsEl = document.getElementById('tags');
        tagsEl.innerHTML = improvementTags[currentMode].map(function(t) {
          return '<span class="tag">' + t + '</span>';
        }).join('');
        document.getElementById('result-section').style.display = 'block';
      }
    } catch(e) {
      var err = document.getElementById('error-msg');
      err.textContent = 'Could not connect to server: ' + e.message;
      err.style.display = 'block';
    }

    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = 'Optimize Prompt →';
  }

  function copyOutput() {
    navigator.clipboard.writeText(document.getElementById('output-box').textContent);
    document.getElementById('copyBtn').textContent = 'Copied ✓';
    setTimeout(function() { document.getElementById('copyBtn').textContent = 'Copy'; }, 2000);
  }

  function useAsInput() {
    document.getElementById('inputPrompt').value = document.getElementById('output-box').textContent;
    document.getElementById('result-section').style.display = 'none';
  }

  function clearAll() {
    document.getElementById('inputPrompt').value = '';
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';
  }
</script>
</body>
</html>
